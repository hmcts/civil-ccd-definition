name: Update README Test Documentation Tables

on:
  push:
    branches:
      - master

jobs:
  generate-readme-tables:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Use Node.js 18
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install dependencies
        env:
          YARN_ENABLE_SCRIPTS: "false"
        run: yarn install --frozen-lockfile

      - name: Regenerate documentation JSON
        run: |
          yarn test:generate:e2e-api-data
          yarn test:generate:e2e-ui-data

      - name: Update README UI table
        run: yarn test:readme:e2e-ui-table

      - name: Update README API table
        run: yarn test:readme:e2e-api-table

      - name: Commit and push README updates
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore: refresh README test documentation tables"
          branch: master
